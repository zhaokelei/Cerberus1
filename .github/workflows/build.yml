name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android NDK
      run: |
        sdkmanager --install "ndk;29.0.14206865"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android, x86_64-linux-android

    - name: Install cargo-ndk
      run: cargo install cargo-ndk

    - name: Build Rust library
      working-directory: rust
      run: |
        cargo ndk -t arm64-v8a -t x86_64 -o ../app/src/main/jniLibs build --release

    - name: Generate UniFFI Kotlin bindings
      working-directory: rust
      run: |
        cargo run --bin uniffi-bindgen generate --library target/aarch64-linux-android/release/librust_core.so --language kotlin --out-dir ../app/src/main/java

    - name: List generated Kotlin bindings
      run: |
        find app/src/main/java -name "*.kt" -path "*/rust_core*" | head -20

    - name: List jniLibs directory
      run: |
        ls -la app/src/main/jniLibs/
        ls -la app/src/main/jniLibs/arm64-v8a/ 2>/dev/null || echo "arm64-v8a not found"
        ls -la app/src/main/jniLibs/x86_64/ 2>/dev/null || echo "x86_64 not found"

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK (已签名)
      run: ./gradlew assembleDebug

    - name: Build Release APK (无签名，用于测试)
      run: ./gradlew assembleRelease

    - name: List build outputs
      run: |
        find app/build -name "*.apk" -type f 2>/dev/null || echo "No APK found"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"
        ls -la app/build/outputs/apk/release/ 2>/dev/null || echo "Release directory not found"

    - name: Upload Debug APK (已签名)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-signed
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-unsigned
        path: app/build/outputs/apk/release/app-release.apk

    - name: Upload Build Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/reports/
          app/build/outputs/
        continue-on-error: true
